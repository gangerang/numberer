<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanity Number Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  line-height: 1.5;
  padding: 1.5rem;
  max-width: 1100px;
  margin: 0 auto;
}

h1 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 1.25rem;
  letter-spacing: -0.02em;
}

.panel {
  background: #fff;
  border: 1px solid #d2d2d7;
  border-radius: 12px;
  padding: 1rem 1.25rem;
  margin-bottom: 0.75rem;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}

.control-group { display: flex; flex-direction: column; gap: 0.25rem; }

label {
  font-size: 0.75rem;
  font-weight: 600;
  color: #6e6e73;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

input[type="text"], select {
  border: 1px solid #d2d2d7;
  border-radius: 8px;
  padding: 0.5rem 0.75rem;
  font-size: 0.875rem;
  font-family: inherit;
  background: #fafafa;
  transition: border-color 0.15s;
}
input[type="text"]:focus, select:focus {
  outline: none;
  border-color: #0071e3;
  box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
}

.search-row {
  display: flex;
  gap: 0.4rem;
}
.search-row input[type="text"] { flex: 1; }
.search-btn {
  border: 1px solid #0071e3;
  border-radius: 8px;
  padding: 0.5rem 0.75rem;
  font-size: 0.8rem;
  font-weight: 600;
  background: #0071e3;
  color: #fff;
  cursor: pointer;
  white-space: nowrap;
}
.search-btn:hover { background: #005bb5; }
.search-btn:disabled { background: #a0c4e8; border-color: #a0c4e8; cursor: default; }

.digit-preview {
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  font-size: 0.8rem;
  color: #0071e3;
  min-height: 1.2em;
  margin-top: 0.15rem;
}

/* Word browser */
.word-browser-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.5rem;
  flex-wrap: wrap;
}
.word-browser-header label { margin: 0; white-space: nowrap; }
.word-browser-header input[type="text"] { flex: 1; min-width: 120px; max-width: 200px; }

.word-browser-actions {
  display: flex;
  gap: 0.35rem;
  align-items: center;
  margin-left: auto;
}

.sort-btn, .clear-btn {
  background: none;
  border: 1px solid #d2d2d7;
  border-radius: 6px;
  padding: 0.25rem 0.5rem;
  font-size: 0.65rem;
  font-weight: 600;
  color: #6e6e73;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.sort-btn:hover, .clear-btn:hover { background: #f0f0f0; color: #1d1d1f; }
.sort-btn.active { background: #e8e8ed; color: #1d1d1f; border-color: #aaa; }

.word-sub-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.4rem;
}

.word-hint {
  font-size: 0.65rem;
  color: #8e8e93;
}

.cb-label {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.7rem;
  font-weight: 500;
  color: #6e6e73;
  cursor: pointer;
  text-transform: none;
  letter-spacing: normal;
  user-select: none;
}
.cb-label input[type="checkbox"] {
  margin: 0;
  cursor: pointer;
}

.active-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-bottom: 0.5rem;
  min-height: 0;
}
.active-filters:empty { display: none; }
#active-filters-1 { min-height: 1.6rem; display: flex; }

.filter-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.2rem 0.5rem;
  border-radius: 5px;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  cursor: pointer;
  letter-spacing: 0.03em;
}
.filter-pill.s1 {
  background: #d4edda;
  color: #155724;
  border: 1px solid #a3d9b1;
}
.filter-pill.s2 {
  background: #d1ecf1;
  color: #0c5460;
  border: 1px solid #86cfda;
}
.filter-pill .remove { font-size: 0.85em; opacity: 0.6; }
.filter-pill:hover .remove { opacity: 1; }

.word-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  max-height: 200px;
  overflow-y: auto;
  padding: 0.25rem 0;
}

.word-chip {
  display: inline-block;
  padding: 0.15rem 0.45rem;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 500;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  border: 1px solid #d2d2d7;
  background: #fafafa;
  color: #6e6e73;
  transition: all 0.1s;
}
.word-chip:hover { border-color: #999; color: #1d1d1f; }
.word-chip.selected {
  background: #d4edda;
  color: #155724;
  border-color: #a3d9b1;
  font-weight: 700;
}
.word-chip.s2-selected {
  background: #d1ecf1;
  color: #0c5460;
  border-color: #86cfda;
  font-weight: 700;
}
.word-chip .count {
  font-weight: 400;
  opacity: 0.6;
  margin-left: 0.15rem;
  font-size: 0.9em;
}
.word-chip .comp-count {
  font-weight: 400;
  opacity: 0.5;
  margin-left: 0.1rem;
  font-size: 0.85em;
  color: #0071e3;
}

/* Stage 2 panel */
#word-panel-2 {
  border-left: 3px solid #0071e3;
}
#word-panel-2[hidden] { display: none; }

/* Status bar */
.status-bar {
  font-size: 0.8rem;
  color: #6e6e73;
  margin-bottom: 0.5rem;
  display: flex;
  justify-content: space-between;
}

/* Table */
.table-wrap {
  background: #fff;
  border: 1px solid #d2d2d7;
  border-radius: 12px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

thead { position: sticky; top: 0; z-index: 1; }

th {
  background: #f5f5f7;
  border-bottom: 2px solid #d2d2d7;
  padding: 0.6rem 0.75rem;
  text-align: left;
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #6e6e73;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
th:hover { color: #1d1d1f; }
th .sort-arrow { margin-left: 0.25rem; font-size: 0.65rem; }

td {
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid #ebebed;
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr.data-row:hover td { background: #f0f5ff; }

/* Number display */
.num {
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  font-size: 0.9rem;
  letter-spacing: 0.03em;
  white-space: nowrap;
}

.num-vanity {
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  font-size: 0.9rem;
  letter-spacing: 0.03em;
  white-space: nowrap;
}
.vd-digits { color: #8e8e93; }
.vd-word { color: #1d1d1f; font-weight: 600; }

.num-raw {
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  font-size: 0.72rem;
  letter-spacing: 0.03em;
  white-space: nowrap;
  color: #aeaeb2;
  margin-top: 0.1rem;
}

.badge {
  display: inline-block;
  background: #fff3cd;
  color: #856404;
  border: 1px solid #ffc107;
  border-radius: 4px;
  padding: 0.1rem 0.4rem;
  font-size: 0.7rem;
  font-weight: 600;
  margin: 0.1rem 0.15rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  cursor: pointer;
}
.badge:hover { background: #ffe69c; }
.badge.is-s1 {
  background: #d4edda;
  color: #155724;
  border-color: #a3d9b1;
}
.badge.is-s2 {
  background: #d1ecf1;
  color: #0c5460;
  border-color: #86cfda;
}

mark {
  background: #bbdefb;
  color: inherit;
  border-radius: 2px;
  padding: 0 1px;
}

.location {
  color: #6e6e73;
  font-size: 0.8rem;
}

.rank-cell {
  color: #8e8e93;
  font-variant-numeric: tabular-nums;
  text-align: right;
  width: 2.5rem;
}

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: #8e8e93;
  font-size: 0.9rem;
}

/* Combo lines in number cell */
.combo-line .vd-word { font-weight: 600; color: #1d1d1f; }
.combo-line .vd-digits { color: #8e8e93; }


@media (max-width: 640px) {
  body { padding: 0.75rem; }
  .controls { grid-template-columns: 1fr; }
  .num, .num-vanity { font-size: 0.8rem; }
  .num-raw { font-size: 0.65rem; }
  .word-browser-header input[type="text"] { max-width: none; }
}
</style>
</head>
<body>

<h1>Vanity Number Explorer</h1>

<div class="panel controls">
  <div class="control-group">
    <label for="search">Search digits (min 3)</label>
    <div class="search-row">
      <input type="text" id="search" placeholder="e.g. 2267, CAMP" autocomplete="off" spellcheck="false">
      <button class="search-btn" id="search-btn">Search</button>
    </div>
    <div class="digit-preview" id="digit-preview"></div>
  </div>
  <div class="control-group">
    <label for="state-filter">State</label>
    <select id="state-filter"><option value="">All states</option></select>
  </div>
</div>

<div class="panel" id="word-panel-1">
  <div class="word-browser-header">
    <label>Primary words</label>
    <input type="text" id="word-search-1" placeholder="Filter words..." autocomplete="off" spellcheck="false">
    <div class="word-browser-actions">
      <button class="sort-btn active" data-stage="1" data-wsort="length">Length</button>
      <button class="sort-btn" data-stage="1" data-wsort="count">Count</button>
      <button class="sort-btn" data-stage="1" data-wsort="alpha">A-Z</button>
      <button class="clear-btn" id="clear-stage1">Clear</button>
    </div>
  </div>
  <div class="word-sub-header">
    <span class="word-hint">Click to select words &middot; results show numbers containing any selected word</span>
    <span>
      <label class="cb-label"><input type="checkbox" id="skip-area"> Subscriber only</label>
      <label class="cb-label"><input type="checkbox" id="has-companions"> Has companions</label>
      <label class="cb-label"><input type="checkbox" id="short-words"> Short words (1-2 letters)</label>
    </span>
  </div>
  <div class="active-filters" id="active-filters-1"></div>
  <div class="word-grid" id="word-grid-1"></div>
</div>

<div class="panel" id="word-panel-2" hidden>
  <div class="word-browser-header">
    <label>Companion words <span id="companion-count"></span></label>
    <input type="text" id="word-search-2" placeholder="Filter companions..." autocomplete="off" spellcheck="false">
    <div class="word-browser-actions">
      <button class="sort-btn active" data-stage="2" data-wsort="length">Length</button>
      <button class="sort-btn" data-stage="2" data-wsort="count">Count</button>
      <button class="sort-btn" data-stage="2" data-wsort="alpha">A-Z</button>
      <button class="clear-btn" id="clear-stage2">Clear</button>
    </div>
  </div>
  <div class="word-sub-header">
    <span class="word-hint">Words that co-exist in valid combos with your primary selections</span>
  </div>
  <div class="active-filters" id="active-filters-2"></div>
  <div class="word-grid" id="word-grid-2"></div>
</div>

<div class="status-bar">
  <span id="result-count">Select one or more words to see matching numbers</span>
  <span id="cap-notice"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th class="rank-cell">#</th>
        <th data-sort="number">Number</th>
        <th data-sort="words">Words</th>
        <th data-sort="location">Location</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script src="explorer_data.js?v=2"></script>
<script>
(function() {
  "use strict";

  var RENDER_CAP = 5000;
  var KEYPAD = {a:"2",b:"2",c:"2",d:"3",e:"3",f:"3",g:"4",h:"4",i:"4",j:"5",k:"5",l:"5",m:"6",n:"6",o:"6",p:"7",q:"7",r:"7",s:"7",t:"8",u:"8",v:"8",w:"9",x:"9",y:"9",z:"9"};

  var sortCol = "coverage";
  var sortAsc = false;
  var wordSort1 = "length";
  var wordSort2 = "length";

  // Two-stage word selections
  var stage1Words = new Set();
  var stage2Words = new Set();

  // Computed state
  var comboCache = {};        // raw → array of combos containing a stage 1 word
  var stage1Numbers = {};     // raw → DATA entry, numbers matching stage 1
  var stage2Available = {};   // word → count
  var resultRows = [];        // final sorted results

  // DOM refs
  var $search = document.getElementById("search");
  var $state = document.getElementById("state-filter");
  var $preview = document.getElementById("digit-preview");
  var $count = document.getElementById("result-count");
  var $cap = document.getElementById("cap-notice");
  var $tbody = document.getElementById("tbody");
  var $wordSearch1 = document.getElementById("word-search-1");
  var $wordSearch2 = document.getElementById("word-search-2");
  var $wordGrid1 = document.getElementById("word-grid-1");
  var $wordGrid2 = document.getElementById("word-grid-2");
  var $activeFilters1 = document.getElementById("active-filters-1");
  var $activeFilters2 = document.getElementById("active-filters-2");
  var $clearStage1 = document.getElementById("clear-stage1");
  var $clearStage2 = document.getElementById("clear-stage2");
  var $skipArea = document.getElementById("skip-area");
  var $hasCompanions = document.getElementById("has-companions");
  var $shortWords = document.getElementById("short-words");
  var $panel2 = document.getElementById("word-panel-2");

  // --- Build indexes ---
  var NUM_WORDS = {};   // raw → [[word, pos], ...]
  var NUM_DIGITS = {};  // raw → subscriber digits string
  var NUM_DATA = {};    // raw → DATA entry
  var WORD_TO_NUMS = {}; // word → Set of raw number strings

  var i, j, r, wList;
  for (i = 0; i < DATA.length; i++) {
    r = DATA[i];
    wList = r.w || [];
    NUM_WORDS[r.n] = wList;
    NUM_DATA[r.n] = r;
    NUM_DIGITS[r.n] = r.n.startsWith("61") ? r.n.slice(2) : r.n.slice(1);
    for (j = 0; j < wList.length; j++) {
      var word = wList[j][0];
      if (!WORD_TO_NUMS[word]) WORD_TO_NUMS[word] = new Set();
      WORD_TO_NUMS[word].add(r.n);
    }
  }

  // --- Generate digit pattern "words" ---
  var _pats = {};
  var _d, _k, _s;
  // Repeated digits: 00, 000, 0000, 00000, 11, 111, ...
  for (_d = 0; _d <= 9; _d++) {
    _s = String(_d);
    for (_k = 1; _k < 5; _k++) {
      _s += _d;
      _pats[_s] = true;
    }
  }
  // Round numbers: 10, 20, ..., 100, 200, ..., 1000, 2000, ...
  for (_d = 1; _d <= 9; _d++) {
    _pats[_d + "0"] = true;
    _pats[_d + "00"] = true;
    _pats[_d + "000"] = true;
  }
  // Ascending sequences (3-5 digits): 012, 123, ..., 01234, 12345, ...
  for (_d = 0; _d <= 9; _d++) {
    for (_k = 3; _k <= 5; _k++) {
      if (_d + _k - 1 > 9) break;
      _s = "";
      for (var _j = 0; _j < _k; _j++) _s += (_d + _j);
      _pats[_s] = true;
    }
  }
  // Descending sequences (3-5 digits): 210, 321, ..., 98765, ...
  for (_d = 9; _d >= 0; _d--) {
    for (_k = 3; _k <= 5; _k++) {
      if (_d - _k + 1 < 0) break;
      _s = "";
      for (var _j2 = 0; _j2 < _k; _j2++) _s += (_d - _j2);
      _pats[_s] = true;
    }
  }

  // Scan all numbers for pattern occurrences, add as word entries
  var DIGIT_PATTERNS = Object.keys(_pats);
  for (var pi = 0; pi < DIGIT_PATTERNS.length; pi++) {
    var pat = DIGIT_PATTERNS[pi];
    for (var ni = 0; ni < DATA.length; ni++) {
      var raw = DATA[ni].n;
      var d9 = NUM_DIGITS[raw];
      var pos = 0;
      while (true) {
        var idx = d9.indexOf(pat, pos);
        if (idx === -1) break;
        NUM_WORDS[raw].push([pat, idx]);
        if (!WORD_TO_NUMS[pat]) WORD_TO_NUMS[pat] = new Set();
        WORD_TO_NUMS[pat].add(raw);
        pos = idx + 1;
      }
    }
  }

  // --- Generate short (1-2 letter) word entries ---
  var SHORT_WORD_LIST = [
    "a", "i",
    "ad", "ah", "am", "an", "as", "at", "ax",
    "be", "bi", "bo", "by",
    "do",
    "go",
    "ha", "he", "hi", "ho",
    "if", "in", "is", "it",
    "la", "lo",
    "ma", "me", "mi", "mo", "mu", "my",
    "no", "nu",
    "of", "oh", "ok", "on", "or", "ow", "ox",
    "pa", "pi",
    "re",
    "so",
    "to", "uh", "um", "un", "up", "us",
    "we", "wo"
  ];
  var SHORT_WORDS = new Set(SHORT_WORD_LIST);

  // Group by digit sequence to scan efficiently
  var _shortByDigits = {};
  for (var si = 0; si < SHORT_WORD_LIST.length; si++) {
    var sw = SHORT_WORD_LIST[si];
    var sd = wordToDigits(sw);
    if (!_shortByDigits[sd]) _shortByDigits[sd] = [];
    _shortByDigits[sd].push(sw);
  }
  for (var digits in _shortByDigits) {
    var matchingWords = _shortByDigits[digits];
    for (var ni2 = 0; ni2 < DATA.length; ni2++) {
      var raw2 = DATA[ni2].n;
      var d9b = NUM_DIGITS[raw2];
      var pos2 = 0;
      while (true) {
        var idx2 = d9b.indexOf(digits, pos2);
        if (idx2 === -1) break;
        for (var wi = 0; wi < matchingWords.length; wi++) {
          NUM_WORDS[raw2].push([matchingWords[wi], idx2]);
          if (!WORD_TO_NUMS[matchingWords[wi]]) WORD_TO_NUMS[matchingWords[wi]] = new Set();
          WORD_TO_NUMS[matchingWords[wi]].add(raw2);
        }
        pos2 = idx2 + 1;
      }
    }
  }

  // --- Word counts (cached by state+skipArea+shortWords) ---
  var cachedWordList = null;
  var cachedWordKey = "";

  function getWordList() {
    var skipArea = $skipArea.checked;
    var includeShort = $shortWords.checked;
    var st = $state.value;
    var key = st + "|" + (skipArea ? "1" : "0") + "|" + (includeShort ? "1" : "0");
    if (key === cachedWordKey) return cachedWordList;

    var counts = {};
    for (var i = 0; i < DATA.length; i++) {
      var d = DATA[i];
      if (st && d.s !== st) continue;
      var wList = NUM_WORDS[d.n] || [];
      var seen = {};
      for (var j = 0; j < wList.length; j++) {
        if (skipArea && wList[j][1] === 0) continue;
        var w = wList[j][0];
        if (!includeShort && SHORT_WORDS.has(w)) continue;
        if (!seen[w]) {
          seen[w] = true;
          counts[w] = (counts[w] || 0) + 1;
        }
      }
    }
    var out = [];
    for (var k in counts) out.push([k, counts[k]]);
    cachedWordList = out;
    cachedWordKey = key;
    return out;
  }

  // --- Companion counts per word (cached by state+skipArea+shortWords) ---
  var cachedCompCounts = null;
  var cachedCompKey = "";

  function getCompanionCounts() {
    var skipArea = $skipArea.checked;
    var includeShort = $shortWords.checked;
    var st = $state.value;
    var key = st + "|" + (skipArea ? "1" : "0") + "|" + (includeShort ? "1" : "0");
    if (key === cachedCompKey) return cachedCompCounts;

    var companions = {}; // word → Set of companion words
    for (var i = 0; i < DATA.length; i++) {
      var d = DATA[i];
      if (st && d.s !== st) continue;
      var wList = NUM_WORDS[d.n] || [];
      if (wList.length < 2) continue;

      var words = [];
      for (var j = 0; j < wList.length; j++) {
        if (skipArea && wList[j][1] === 0) continue;
        if (!includeShort && SHORT_WORDS.has(wList[j][0])) continue;
        words.push(wList[j]);
      }

      for (var a = 0; a < words.length; a++) {
        for (var b = a + 1; b < words.length; b++) {
          var w1 = words[a][0], p1 = words[a][1], l1 = w1.length;
          var w2 = words[b][0], p2 = words[b][1], l2 = w2.length;
          if (w1 === w2) continue;
          if (p2 >= p1 + l1 || p1 >= p2 + l2) {
            if (!companions[w1]) companions[w1] = new Set();
            companions[w1].add(w2);
            if (!companions[w2]) companions[w2] = new Set();
            companions[w2].add(w1);
          }
        }
      }
    }

    var counts = {};
    for (var w in companions) counts[w] = companions[w].size;
    cachedCompCounts = counts;
    cachedCompKey = key;
    return counts;
  }

  // --- State dropdown ---
  var stateSet = {};
  for (i = 0; i < DATA.length; i++) stateSet[DATA[i].s] = 1;
  var states = Object.keys(stateSet).sort();
  for (i = 0; i < states.length; i++) {
    var opt = document.createElement("option");
    opt.value = states[i];
    opt.textContent = states[i];
    $state.appendChild(opt);
  }

  // --- Helpers ---

  function wordToDigits(word) {
    if (/^\d+$/.test(word)) return word;
    var out = "", c;
    for (var i = 0; i < word.length; i++) {
      c = KEYPAD[word[i].toLowerCase()];
      if (c) out += c;
    }
    return out;
  }

  function formatNumber(raw) {
    var local = raw.startsWith("61") ? "0" + raw.slice(2) : raw;
    if (local.length === 10) return local.slice(0,2) + " " + local.slice(2,6) + " " + local.slice(6);
    return local;
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function formatComboHtml(raw, combo) {
    var local = raw.startsWith("61") ? "0" + raw.slice(2) : raw;
    var chars = local.split("");
    // Track which combo word each position belongs to (-1 = digit)
    var seg = new Array(chars.length);
    for (var k = 0; k < chars.length; k++) seg[k] = -1;
    for (var ci = 0; ci < combo.length; ci++) {
      var w = combo[ci][0], p = combo[ci][1];
      for (var ch = 0; ch < w.length; ch++) {
        var idx = p + ch + 1; // +1: positions are in 9-digit string, local has leading 0
        if (idx < chars.length) {
          chars[idx] = w[ch];
          seg[idx] = ci;
        }
      }
    }
    // Build HTML: group by segment id, space between groups
    var html = "";
    var i = 0;
    while (i < chars.length) {
      var sid = seg[i];
      var part = "";
      while (i < chars.length && seg[i] === sid) {
        part += chars[i];
        i++;
      }
      if (html) html += " ";
      if (sid >= 0) {
        html += '<span class="vd-word">' + escHtml(part) + '</span>';
      } else {
        html += '<span class="vd-digits">' + escHtml(part) + '</span>';
      }
    }
    return html;
  }

  function highlightDigits(formatted, digitStr) {
    if (!digitStr) return escHtml(formatted);
    var raw = formatted.replace(/ /g, "");
    var d9 = raw.slice(1);
    var idx = d9.indexOf(digitStr);
    if (idx === -1) return escHtml(formatted);
    var hs = idx, he = idx + digitStr.length;
    var parts = formatted.split("");
    var result = [], si = -1;
    for (var i = 0; i < parts.length; i++) {
      if (parts[i] === " ") { result.push(" "); continue; }
      if (si >= hs && si < he) result.push('<mark>' + escHtml(parts[i]) + '</mark>');
      else result.push(escHtml(parts[i]));
      si++;
    }
    return result.join("");
  }

  // --- Combination finder ---

  function findCombinations(wordsByStart, pos, n) {
    if (pos >= n) return [[]];
    var results = findCombinations(wordsByStart, pos + 1, n);
    var wordsHere = wordsByStart[pos] || [];
    for (var i = 0; i < wordsHere.length; i++) {
      var w = wordsHere[i];
      var sub = findCombinations(wordsByStart, pos + w[0].length, n);
      for (var j = 0; j < sub.length; j++) {
        results.push([w].concat(sub[j]));
      }
    }
    return results;
  }

  function getCombinations(raw, skipArea, includeShort) {
    var words = NUM_WORDS[raw] || [];
    if (!words.length) return [];

    var byStart = {};
    for (var i = 0; i < words.length; i++) {
      var w = words[i][0], p = words[i][1];
      if (skipArea && p === 0) continue;
      if (!includeShort && SHORT_WORDS.has(w)) continue;
      if (!byStart[p]) byStart[p] = [];
      byStart[p].push([w, p]);
    }

    var combos = findCombinations(byStart, 0, 9);

    var valid = [];
    for (var j = 0; j < combos.length; j++) {
      if (combos[j].length > 0) valid.push(combos[j]);
    }

    valid.sort(function(a, b) {
      var covA = 0, covB = 0;
      for (var k = 0; k < a.length; k++) covA += a[k][0].length;
      for (var k2 = 0; k2 < b.length; k2++) covB += b[k2][0].length;
      if (covA !== covB) return covB - covA;
      return b.length - a.length;
    });

    return valid;
  }

  function comboCoverage(combo) {
    var cov = 0;
    for (var i = 0; i < combo.length; i++) cov += combo[i][0].length;
    return cov;
  }

  function comboContainsAny(combo, wordSet) {
    for (var i = 0; i < combo.length; i++) {
      if (wordSet.has(combo[i][0])) return true;
    }
    return false;
  }

  function comboWords(combo) {
    var words = [];
    for (var i = 0; i < combo.length; i++) words.push(combo[i][0]);
    return words;
  }

  // --- Sorted word list helpers ---

  function sortWordEntries(entries, sortBy) {
    var sorted = entries.slice();
    if (sortBy === "count") {
      sorted.sort(function(a, b) { return b[1] - a[1] || a[0].localeCompare(b[0]); });
    } else if (sortBy === "alpha") {
      sorted.sort(function(a, b) { return a[0].localeCompare(b[0]); });
    } else {
      sorted.sort(function(a, b) { return b[0].length - a[0].length || b[1] - a[1] || a[0].localeCompare(b[0]); });
    }
    return sorted;
  }

  // --- Render word grids ---

  function renderWordGrid1() {
    var all = getWordList();
    var compCounts = getCompanionCounts();
    var filter = $wordSearch1.value.trim().toLowerCase();
    var onlyWithCompanions = $hasCompanions.checked;
    var words = all.filter(function(e) {
      if (filter && e[0].indexOf(filter) === -1) return false;
      if (onlyWithCompanions && !compCounts[e[0]]) return false;
      return true;
    });
    words = sortWordEntries(words, wordSort1);

    var html = "";
    for (var i = 0; i < words.length; i++) {
      var w = words[i][0], c = words[i][1];
      var cc = compCounts[w] || 0;
      var cls = stage1Words.has(w) ? " selected" : "";
      html += '<span class="word-chip' + cls + '" data-word="' + w + '">'
        + escHtml(w) + '<span class="count">' + c + '</span>'
        + (cc ? '<span class="comp-count">\u2194' + cc + '</span>' : '')
        + '</span>';
    }
    $wordGrid1.innerHTML = html;
  }

  function renderWordGrid2() {
    var $companionCount = document.getElementById("companion-count");
    if (stage1Words.size === 0) {
      $panel2.hidden = true;
      return;
    }
    $panel2.hidden = false;

    var totalCompanions = Object.keys(stage2Available).length;
    $companionCount.textContent = "(" + totalCompanions + ")";

    var filter = $wordSearch2.value.trim().toLowerCase();
    var entries = [];
    for (var w in stage2Available) {
      if (filter && w.indexOf(filter) === -1) continue;
      entries.push([w, stage2Available[w]]);
    }
    entries = sortWordEntries(entries, wordSort2);

    var html = "";
    for (var i = 0; i < entries.length; i++) {
      var w2 = entries[i][0], c = entries[i][1];
      var cls = stage2Words.has(w2) ? " s2-selected" : "";
      html += '<span class="word-chip' + cls + '" data-word="' + w2 + '">'
        + escHtml(w2) + '<span class="count">' + c + '</span></span>';
    }
    $wordGrid2.innerHTML = html;
  }

  function renderActiveFilters1() {
    if (stage1Words.size === 0) {
      $activeFilters1.innerHTML = "";
      return;
    }
    var words = Array.from(stage1Words).sort();
    var html = '';
    for (var i = 0; i < words.length; i++) {
      html += '<span class="filter-pill s1" data-word="' + escHtml(words[i]) + '">'
        + escHtml(words[i]) + ' <span class="remove">&times;</span></span>';
    }
    $activeFilters1.innerHTML = html;
  }

  function renderActiveFilters2() {
    if (stage2Words.size === 0) {
      $activeFilters2.innerHTML = "";
      return;
    }
    var words = Array.from(stage2Words).sort();
    var html = '';
    for (var i = 0; i < words.length; i++) {
      html += '<span class="filter-pill s2" data-word="' + escHtml(words[i]) + '">'
        + escHtml(words[i]) + ' <span class="remove">&times;</span></span>';
    }
    $activeFilters2.innerHTML = html;
  }

  // --- Computation ---

  function computeStage1Results() {
    comboCache = {};
    stage1Numbers = {};
    stage2Available = {};

    if (stage1Words.size === 0) return;

    var stateFilter = $state.value;
    var skipArea = $skipArea.checked;
    var includeShort = $shortWords.checked;
    var searchDigits = getSearchDigits();

    // Union all numbers containing any stage 1 word
    var numSet = new Set();
    stage1Words.forEach(function(w) {
      var nums = WORD_TO_NUMS[w];
      if (nums) nums.forEach(function(n) { numSet.add(n); });
    });

    // Apply pre-filters and compute combos
    var s2Counts = {};
    numSet.forEach(function(raw) {
      var d = NUM_DATA[raw];
      if (!d) return;
      if (stateFilter && d.s !== stateFilter) return;
      if (searchDigits && NUM_DIGITS[raw].indexOf(searchDigits) === -1) return;

      var combos = getCombinations(raw, skipArea, includeShort);
      // Filter combos to those containing at least one stage 1 word
      var filtered = [];
      for (var i = 0; i < combos.length; i++) {
        if (comboContainsAny(combos[i], stage1Words)) {
          filtered.push(combos[i]);
        }
      }
      if (filtered.length === 0) return;

      comboCache[raw] = filtered;
      stage1Numbers[raw] = d;

      // Collect companion words
      for (var ci = 0; ci < filtered.length; ci++) {
        var words = comboWords(filtered[ci]);
        for (var wi = 0; wi < words.length; wi++) {
          if (!stage1Words.has(words[wi])) {
            s2Counts[words[wi]] = (s2Counts[words[wi]] || 0) + 1;
          }
        }
      }
    });

    // Deduplicate companion counts: count distinct numbers, not combos
    // Recompute: for each companion word, how many distinct numbers have it in a filtered combo
    stage2Available = {};
    var companionNums = {}; // word → Set of raw
    for (var raw in comboCache) {
      var combos = comboCache[raw];
      var seenWords = {};
      for (var ci = 0; ci < combos.length; ci++) {
        var ws = comboWords(combos[ci]);
        for (var wi = 0; wi < ws.length; wi++) {
          if (!stage1Words.has(ws[wi]) && !seenWords[ws[wi]]) {
            seenWords[ws[wi]] = true;
            if (!companionNums[ws[wi]]) companionNums[ws[wi]] = 0;
            companionNums[ws[wi]]++;
          }
        }
      }
    }
    stage2Available = companionNums;

    // Prune stage 2 selections no longer available
    stage2Words.forEach(function(w) {
      if (!stage2Available[w]) stage2Words.delete(w);
    });
  }

  function inputToDigits(text) {
    var s = text.trim();
    return s.match(/^\d+$/) ? s : wordToDigits(s) || "";
  }

  function getSearchDigits() {
    return activeSearchDigits;
  }

  function computeResults() {
    resultRows = [];

    if (stage1Words.size === 0) {
      // Digit-search-only mode
      var searchDigits = getSearchDigits();
      if (!searchDigits) return;
      var stateFilter = $state.value;
      var skipArea = $skipArea.checked;
      var includeShort = $shortWords.checked;
      for (var i = 0; i < DATA.length; i++) {
        var d = DATA[i];
        if (stateFilter && d.s !== stateFilter) continue;
        if (NUM_DIGITS[d.n].indexOf(searchDigits) === -1) continue;
        var combos = getCombinations(d.n, skipArea, includeShort);
        resultRows.push({
          raw: d.n,
          d: d,
          best: combos.length > 0 ? combos[0] : null,
          coverage: combos.length > 0 ? comboCoverage(combos[0]) : 0,
          combos: combos
        });
        if (resultRows.length >= RENDER_CAP) break;
      }
    } else {
      var hasS2 = stage2Words.size > 0;

      for (var raw in comboCache) {
        var combos2 = comboCache[raw];
        var matchingCombos;

        if (hasS2) {
          matchingCombos = [];
          for (var j = 0; j < combos2.length; j++) {
            if (comboContainsAny(combos2[j], stage2Words)) {
              matchingCombos.push(combos2[j]);
            }
          }
          if (matchingCombos.length === 0) continue;
        } else {
          matchingCombos = combos2;
        }

        var best = matchingCombos[0];
        var cov = comboCoverage(best);
        var dd = stage1Numbers[raw];

        resultRows.push({
          raw: raw,
          d: dd,
          best: best,
          coverage: cov,
          combos: matchingCombos
        });
      }
    }

    // Sort
    resultRows.sort(function(a, b) {
      switch (sortCol) {
        case "coverage":
          if (a.coverage !== b.coverage) return sortAsc ? a.coverage - b.coverage : b.coverage - a.coverage;
          return a.raw < b.raw ? -1 : 1;
        case "number":
          return sortAsc ? (a.raw < b.raw ? -1 : 1) : (a.raw > b.raw ? -1 : 1);
        case "words":
          var wa = a.best ? a.best[0][0] : "", wb = b.best ? b.best[0][0] : "";
          if (wa < wb) return sortAsc ? -1 : 1;
          if (wa > wb) return sortAsc ? 1 : -1;
          return 0;
        case "location":
          var la = a.d.s + a.d.c, lb = b.d.s + b.d.c;
          if (la < lb) return sortAsc ? -1 : 1;
          if (la > lb) return sortAsc ? 1 : -1;
          return 0;
        default:
          if (a.coverage !== b.coverage) return b.coverage - a.coverage;
          return a.raw < b.raw ? -1 : 1;
      }
    });
  }

  // --- Render results ---

  function renderResults() {
    var searchDigits = getSearchDigits();

    if (resultRows.length === 0) {
      var msg = stage1Words.size === 0 && !getSearchDigits()
        ? "Select words or search digits to see matching numbers"
        : "No numbers match your filters";
      $count.textContent = msg;
      $cap.textContent = "";
      $tbody.innerHTML = '<tr><td colspan="4" class="empty-state">' + msg + '</td></tr>';
      return;
    }

    var total = resultRows.length;
    var showing = Math.min(total, RENDER_CAP);
    $count.textContent = "Showing " + showing + " of " + total + " numbers";
    $cap.textContent = total > RENDER_CAP ? (total - RENDER_CAP) + " more not shown" : "";

    var html = "";
    for (var idx = 0; idx < showing; idx++) {
      var row = resultRows[idx];
      var raw = row.raw;

      // Number cell: all combos formatted inline
      var rawHtml = highlightDigits(formatNumber(raw), searchDigits);
      var numberCell = '';
      if (row.combos.length > 0) {
        for (var ci = 0; ci < row.combos.length; ci++) {
          numberCell += '<div class="combo-line">' + formatComboHtml(raw, row.combos[ci]) + '</div>';
        }
      }
      numberCell += '<div class="num-raw">' + rawHtml + '</div>';

      // Word badges: collect unique words from all combos
      var badgesSeen = {};
      var badges = "";
      for (var ci2 = 0; ci2 < row.combos.length; ci2++) {
        for (var bi = 0; bi < row.combos[ci2].length; bi++) {
          var bw = row.combos[ci2][bi][0];
          if (badgesSeen[bw]) continue;
          badgesSeen[bw] = true;
          var bcls = stage1Words.has(bw) ? " is-s1" : stage2Words.has(bw) ? " is-s2" : "";
          badges += '<span class="badge' + bcls + '" data-word="' + escHtml(bw) + '">' + escHtml(bw) + '</span>';
        }
      }

      html += '<tr class="data-row"><td class="rank-cell">' + (idx + 1) + '</td><td>' + numberCell + '</td><td>' + badges + '</td><td class="location">' + escHtml(row.d.s) + ' / ' + escHtml(row.d.c) + '</td></tr>';
    }

    $tbody.innerHTML = html || '<tr><td colspan="4" class="empty-state">No numbers match your filters</td></tr>';
  }


  // --- Stage change handlers ---

  function onStage1Change() {
    computeStage1Results();
    computeResults();
    renderActiveFilters1();
    renderActiveFilters2();
    renderWordGrid1();
    renderWordGrid2();
    renderResults();
    saveHash();
  }

  function onStage2Change() {
    computeResults();
    renderActiveFilters2();
    renderWordGrid2();
    renderResults();
    saveHash();
  }

  // --- Update digit preview ---
  function updateDigitPreview() {
    var searchWord = $search.value.trim();
    if (searchWord && !searchWord.match(/^\d+$/)) {
      var digits = wordToDigits(searchWord);
      $preview.textContent = digits ? "\u2192 " + digits : "";
    } else {
      $preview.textContent = "";
    }
  }

  // --- Event wiring ---

  // Stage 1 chip clicks
  $wordGrid1.addEventListener("click", function(e) {
    var chip = e.target.closest(".word-chip");
    if (!chip) return;
    var word = chip.dataset.word;
    if (stage1Words.has(word)) stage1Words.delete(word);
    else stage1Words.add(word);
    onStage1Change();
  });

  // Stage 2 chip clicks
  $wordGrid2.addEventListener("click", function(e) {
    var chip = e.target.closest(".word-chip");
    if (!chip) return;
    var word = chip.dataset.word;
    if (stage2Words.has(word)) stage2Words.delete(word);
    else stage2Words.add(word);
    onStage2Change();
  });

  // Stage 1 pill remove
  $activeFilters1.addEventListener("click", function(e) {
    var pill = e.target.closest(".filter-pill");
    if (!pill) return;
    stage1Words.delete(pill.dataset.word);
    onStage1Change();
  });

  // Stage 2 pill remove
  $activeFilters2.addEventListener("click", function(e) {
    var pill = e.target.closest(".filter-pill");
    if (!pill) return;
    stage2Words.delete(pill.dataset.word);
    onStage2Change();
  });

  // Clear stage 1 (clears both)
  $clearStage1.addEventListener("click", function() {
    stage1Words.clear();
    stage2Words.clear();
    $wordSearch1.value = "";
    onStage1Change();
  });

  // Clear stage 2 only
  $clearStage2.addEventListener("click", function() {
    stage2Words.clear();
    $wordSearch2.value = "";
    onStage2Change();
  });

  // Word search filters
  $wordSearch1.addEventListener("input", function() { renderWordGrid1(); });
  $wordSearch2.addEventListener("input", function() { renderWordGrid2(); });

  // Sort buttons
  document.querySelectorAll(".sort-btn[data-stage]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var stage = btn.dataset.stage;
      var sort = btn.dataset.wsort;
      // Update active state for this stage's buttons
      document.querySelectorAll('.sort-btn[data-stage="' + stage + '"]').forEach(function(b) {
        b.classList.remove("active");
      });
      btn.classList.add("active");
      if (stage === "1") {
        wordSort1 = sort;
        renderWordGrid1();
      } else {
        wordSort2 = sort;
        renderWordGrid2();
      }
    });
  });

  // Skip area checkbox
  $skipArea.addEventListener("change", function() {
    cachedWordKey = ""; // invalidate cache
    cachedCompKey = ""; // invalidate companion cache
    onStage1Change();
  });

  $hasCompanions.addEventListener("change", function() {
    renderWordGrid1();
  });

  $shortWords.addEventListener("change", function() {
    cachedWordKey = "";
    cachedCompKey = "";
    onStage1Change();
  });

  // Result table clicks (combo links & badges)
  $tbody.addEventListener("click", function(e) {
    var badge = e.target.closest(".badge");
    if (!badge) return;
    var word = badge.dataset.word;
    // Add to stage 2 if not in stage 1
    if (!stage1Words.has(word)) {
      if (stage2Words.has(word)) stage2Words.delete(word);
      else if (stage2Available[word]) stage2Words.add(word);
        onStage2Change();
    }
  });

  // Sort headers
  document.querySelectorAll("th[data-sort]").forEach(function(th) {
    th.addEventListener("click", function() {
      var col = th.dataset.sort;
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = col === "number" || col === "location";
      }
      // Update sort arrows
      document.querySelectorAll("th .sort-arrow").forEach(function(el) { el.remove(); });
      var arrow = document.createElement("span");
      arrow.className = "sort-arrow";
      arrow.textContent = sortAsc ? "\u25B2" : "\u25BC";
      th.appendChild(arrow);
      computeResults();
      renderResults();
      saveHash();
    });
  });

  // Digit search — button-triggered, min 3 chars
  var $searchBtn = document.getElementById("search-btn");
  var activeSearchDigits = ""; // last committed search

  function doSearch() {
    var digits = inputToDigits($search.value);
    if (digits.length > 0 && digits.length < 3) return;
    activeSearchDigits = digits;
    onStage1Change();
  }

  $search.addEventListener("input", function() {
    updateDigitPreview();
    var digits = inputToDigits($search.value);
    $searchBtn.disabled = digits.length > 0 && digits.length < 3;
    // Clear results immediately when input is emptied
    if (!digits && activeSearchDigits) {
      activeSearchDigits = "";
      onStage1Change();
    }
  });

  $searchBtn.addEventListener("click", doSearch);

  $search.addEventListener("keydown", function(e) {
    if (e.key === "Enter") doSearch();
  });

  // State filter change
  $state.addEventListener("change", function() {
    cachedWordKey = ""; // invalidate cache
    cachedCompKey = ""; // invalidate companion cache
    renderWordGrid1();
    onStage1Change();
  });

  // --- URL hash ---

  function saveHash() {
    var params = new URLSearchParams();
    if ($search.value) params.set("q", $search.value);
    if ($state.value) params.set("st", $state.value);
    if ($skipArea.checked) params.set("sub", "1");
    if (stage1Words.size) params.set("w1", Array.from(stage1Words).sort().join(","));
    if (stage2Words.size) params.set("w2", Array.from(stage2Words).sort().join(","));
    if (sortCol !== "coverage" || sortAsc) params.set("sort", (sortAsc ? "" : "-") + sortCol);
    var h = params.toString();
    history.replaceState(null, "", h ? "#" + h : location.pathname);
  }

  function loadHash() {
    var h = location.hash.slice(1);
    if (!h) return;
    var params = new URLSearchParams(h);
    if (params.has("q")) $search.value = params.get("q");
    if (params.has("st")) $state.value = params.get("st");
    if (params.get("sub") === "1") $skipArea.checked = true;
    if (params.has("w1")) {
      params.get("w1").split(",").forEach(function(w) { if (w) stage1Words.add(w); });
    }
    if (params.has("w2")) {
      params.get("w2").split(",").forEach(function(w) { if (w) stage2Words.add(w); });
    }
    // Support legacy hash params
    if (params.has("inc") && !params.has("w1")) {
      params.get("inc").split(",").forEach(function(w) { if (w) stage1Words.add(w); });
    }
    if (params.has("sort")) {
      var s = params.get("sort");
      if (s.startsWith("-")) { sortCol = s.slice(1); sortAsc = false; }
      else { sortCol = s; sortAsc = true; }
    }
  }

  // --- Init ---
  loadHash();
  activeSearchDigits = inputToDigits($search.value);
  updateDigitPreview();
  renderWordGrid1();
  if (stage1Words.size > 0 || activeSearchDigits.length >= 3) {
    computeStage1Results();
    computeResults();
    renderActiveFilters1();
    renderActiveFilters2();
    renderWordGrid2();
    renderResults();
    saveHash();
  }
})();
</script>
</body>
</html>
